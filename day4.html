<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Todo List</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    li {
      margin: 5px 0;
      background: #f2f2f2;
      padding: 5px;
    }

    button {
      margin-left: 5px;
    }
  </style>
</head>

<body>
  <h2>Todo List</h2>

  <input id="taskInput" placeholder="输入任务" />
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>

  <script>
    let tasks = []

    function addTask() {
      const input = document.getElementById("taskInput")
      const value = input.value.trim()

      if (value === "") return

      tasks.push(value)

      input.value = ""

      render()
    }

    function render() {
      const ul = document.getElementById("list")
      ul.innerHTML = ""

      tasks.forEach((task, index) => {
        const li = document.createElement("li")

        li.innerHTML = `
          ${task}
          <button onclick="removeTask(${index})">删除</button>
        `

        ul.appendChild(li)
      })
    }

    function removeTask(index) {
      tasks.splice(index, 1)
      render()
    }
  </script>
</body>
</html>
